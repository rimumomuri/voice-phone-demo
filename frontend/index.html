<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 電話対応デモ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #fafafa; color: #1a1a1a; }
    .container { max-width: 560px; margin: 48px auto; padding: 0 24px; }
    h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 28px; color: #111; }
    .card { background: #fff; border-radius: 10px; padding: 28px; margin-bottom: 16px; border: 1px solid #e8e8e8; }
    .card h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: #888; margin-bottom: 14px; }
    blockquote { background: #f5f5f5; border-left: 2px solid #ccc; padding: 12px 16px; border-radius: 4px; font-size: 14px; color: #444; margin: 14px 0; line-height: 1.7; }
    button { padding: 11px 22px; font-size: 14px; font-weight: 500; border: none; border-radius: 7px; cursor: pointer; transition: background 0.15s, opacity 0.15s; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-rec { background: #111; color: #fff; }
    .btn-rec:hover:not(:disabled) { background: #333; }
    .btn-rec.recording { background: #c0392b; }
    .btn-confirm { background: #f0f0f0; color: #111; margin-left: 8px; }
    .btn-confirm:hover:not(:disabled) { background: #e0e0e0; }
    .btn-speak { background: #111; color: #fff; width: 100%; padding: 18px; font-size: 15px; font-weight: 500; letter-spacing: -0.2px; border-radius: 8px; }
    .btn-speak:hover:not(:disabled) { background: #333; }
    #chat-log { min-height: 72px; max-height: 300px; overflow-y: auto; background: #f7f7f7; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
    .msg-wrap { display: flex; flex-direction: column; }
    .msg { margin: 5px 0; padding: 8px 13px; border-radius: 16px; max-width: 82%; font-size: 14px; line-height: 1.5; }
    .msg-user { background: #111; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-ai { background: #fff; border: 1px solid #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; color: #222; }
    #status { font-size: 12px; color: #aaa; margin-bottom: 12px; min-height: 18px; letter-spacing: 0.1px; }
    .hidden { display: none; }
    .step-num { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #bbb; margin-bottom: 8px; text-transform: uppercase; }
  </style>
</head>
<body>
<div class="container">
  <h1>AI 電話対応デモ</h1>

  <!-- Step 1: 声の登録 -->
  <div class="card" id="step-register">
    <div class="step-num">Step 1</div>
    <h2>声を登録する</h2>
    <p style="font-size:14px;color:#666;margin-bottom:10px;">下のテキストを読み上げながら録音してください（約10秒）</p>
    <blockquote>「こんにちは。本日はお電話いただきありがとうございます。少々お待ちください。どのようなご用件でしょうか。」</blockquote>
    <div style="margin-top:18px;">
      <button class="btn-rec" id="btn-rec" onclick="toggleRegister()">録音開始</button>
      <button class="btn-confirm hidden" id="btn-send-voice" onclick="submitVoice()">登録する</button>
    </div>
    <p id="reg-status" style="font-size:12px;color:#aaa;margin-top:10px;"></p>
  </div>

  <!-- Step 2: 会話 -->
  <div class="card hidden" id="step-chat">
    <div class="step-num">Step 2</div>
    <h2>話しかける</h2>
    <div class="msg-wrap" id="chat-log"></div>
    <div id="status">ボタンを押している間、話してください</div>
    <button class="btn-speak" id="btn-speak"
      onmousedown="startChat()" onmouseup="stopChat()"
      ontouchstart="startChat(event)" ontouchend="stopChat(event)">
      押して話す
    </button>
  </div>
</div>

<script>
  let recorder = null;
  let chunks = [];
  let regBlob = null;
  let chatStream = null;

  async function toggleRegister() {
    const btn = document.getElementById('btn-rec');
    if (recorder && recorder.state === 'recording') {
      recorder.stop();
      btn.textContent = '● 録音開始';
      btn.classList.remove('recording');
      return;
    }
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    chunks = [];
    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      regBlob = new Blob(chunks, { type: 'audio/webm' });
      document.getElementById('btn-send-voice').classList.remove('hidden');
      document.getElementById('reg-status').textContent = '録音完了。登録ボタンを押してください。';
    };
    recorder.start();
    btn.textContent = '録音停止';
    btn.classList.add('recording');
  }

  async function submitVoice() {
    if (!regBlob) return;
    document.getElementById('reg-status').textContent = '登録中...';
    const form = new FormData();
    form.append('file', regBlob, 'voice.webm');
    const res = await fetch('/register-voice', { method: 'POST', body: form });
    if (res.ok) {
      document.getElementById('step-register').classList.add('hidden');
      document.getElementById('step-chat').classList.remove('hidden');
    } else {
      document.getElementById('reg-status').textContent = 'エラーが発生しました。もう一度お試しください。';
    }
  }

  async function startChat(e) {
    if (e) e.preventDefault();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    chatStream = stream;
    chunks = [];
    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = ev => chunks.push(ev.data);
    recorder.start();
    document.getElementById('btn-speak').textContent = '録音中 — 離して送信';
    document.getElementById('status').textContent = '話してください...';
  }

  async function stopChat(e) {
    if (e) e.preventDefault();
    if (!recorder || recorder.state !== 'recording') return;
    recorder.onstop = async () => {
      if (chatStream) chatStream.getTracks().forEach(t => t.stop());
      const blob = new Blob(chunks, { type: 'audio/webm' });
      await sendChat(blob);
    };
    recorder.stop();
  }

  async function sendChat(blob) {
    const btn = document.getElementById('btn-speak');
    btn.disabled = true;
    document.getElementById('status').textContent = 'AI が考え中...';
    const form = new FormData();
    form.append('file', blob, 'chat.webm');
    try {
      const res = await fetch('/chat', { method: 'POST', body: form });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      addMsg(data.user_text, 'msg-user');
      addMsg(data.reply_text, 'msg-ai');
      document.getElementById('status').textContent = 'AI が返答中...';
      await playAudio(data.audio_base64);
    } catch (err) {
      document.getElementById('status').textContent = 'エラー: ' + err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = '押して話す';
      document.getElementById('status').textContent = 'ボタンを押している間、話してください';
    }
  }

  function addMsg(text, cls) {
    const log = document.getElementById('chat-log');
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.textContent = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function playAudio(b64) {
    return new Promise(resolve => {
      const bytes = atob(b64);
      const arr = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
      const url = URL.createObjectURL(new Blob([arr], { type: 'audio/wav' }));
      const audio = new Audio(url);
      audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
      audio.onerror = resolve;
      audio.play();
    });
  }
</script>
</body>
</html>
