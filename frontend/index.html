<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI 電話対応デモ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      background: #f2f2f7;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: #fff;
      padding: 14px 18px 12px;
      border-bottom: 1px solid #e5e5ea;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-title { font-size: 16px; font-weight: 600; color: #111; }
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.2px;
    }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-done    { background: #d1e7dd; color: #0a3622; }

    /* Chat scroll area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg-user   { background: #1c1c1e; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-ai     { background: #fff; color: #222; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e5e5ea; }
    .msg-system { align-self: center; font-size: 12px; color: #aaa; background: none; padding: 2px 0; max-width: 100%; text-align: center; }

    /* Status line */
    .status-bar {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      padding: 4px 16px 2px;
      min-height: 20px;
      flex-shrink: 0;
    }

    /* Bottom panel */
    .bottom {
      background: #fff;
      border-top: 1px solid #e5e5ea;
      padding: 18px 20px 32px;
      flex-shrink: 0;
    }

    /* Registration */
    .reg-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 10px;
    }
    .reg-script {
      background: #f7f7f7;
      border-left: 3px solid #d0d0d0;
      padding: 10px 14px;
      font-size: 13px;
      color: #444;
      line-height: 1.65;
      border-radius: 0 8px 8px 0;
      margin-bottom: 14px;
    }
    .reg-actions { display: flex; gap: 8px; }
    .btn {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      padding: 11px 18px;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-dark  { background: #1c1c1e; color: #fff; flex: 1; }
    .btn-light { background: #f0f0f0; color: #111; }
    .btn-dark:active:not(:disabled)  { opacity: 0.7; }
    .btn-light:active:not(:disabled) { background: #e0e0e0; }

    /* Mic area */
    .mic-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .mic-btn {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: #1c1c1e;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .mic-btn.recording { background: #c0392b; transform: scale(0.94); }
    .mic-btn:disabled  { opacity: 0.35; }
    .mic-btn svg { width: 26px; height: 26px; fill: #fff; }
    .mic-hint { font-size: 12px; color: #aaa; }
    .btn-play-ai {
      width: 100%;
      padding: 15px;
      background: #1a6b3a;
      color: #fff;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-play-ai:active { opacity: 0.8; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-title">AI 電話対応デモ</span>
  <span class="badge badge-pending" id="voice-badge">声 未登録</span>
</div>

<div class="chat-area" id="chat-area">
  <div class="msg msg-system">まず声を登録してください</div>
</div>

<div class="status-bar" id="status"></div>

<div class="bottom">

  <!-- Step 1 -->
  <div id="reg-panel">
    <div class="reg-label">Step 1 — 声を登録する</div>
    <div class="reg-script">「こんにちは。本日はお電話いただきありがとうございます。少々お待ちください。どのようなご用件でしょうか。」</div>
    <div class="reg-actions">
      <button class="btn btn-dark" id="btn-rec" onclick="toggleRegister()">録音開始</button>
      <button class="btn btn-light hidden" id="btn-preview" onclick="previewVoice()">確認</button>
      <button class="btn btn-light hidden" id="btn-register" onclick="submitVoice()">登録</button>
    </div>
  </div>

  <!-- Step 2 -->
  <div id="chat-panel" class="hidden">
    <div class="mic-area">
      <button class="btn-play-ai hidden" id="btn-play-ai" onclick="playPending()">▶ タップして再生</button>
      <button class="mic-btn" id="btn-mic" onclick="toggleChat()">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.31 6-6.72h-1.7z"/></svg>
      </button>
      <span class="mic-hint" id="mic-hint">タップして話す</span>
    </div>
  </div>

</div>

<script>
  let recorder = null, chunks = [], regBlob = null, chatStream = null, audioCtx = null;

  function unlockAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function setStatus(t) { document.getElementById('status').textContent = t; }

  function addMsg(text, type) {
    const area = document.getElementById('chat-area');
    const d = document.createElement('div');
    d.className = 'msg msg-' + type;
    d.textContent = text;
    area.appendChild(d);
    area.scrollTop = area.scrollHeight;
  }

  // ── Voice registration ──────────────────────────────────────
  async function toggleRegister() {
    const btn = document.getElementById('btn-rec');
    if (recorder && recorder.state === 'recording') {
      recorder.stop();
      btn.textContent = '録音開始';
      btn.style.background = '';
      return;
    }
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    chunks = [];
    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      regBlob = new Blob(chunks, { type: 'audio/webm' });
      document.getElementById('btn-preview').classList.remove('hidden');
      document.getElementById('btn-register').classList.remove('hidden');
      setStatus('録音完了。確認してから登録してください。');
    };
    recorder.start();
    btn.textContent = '停止';
    btn.style.background = '#c0392b';
  }

  async function previewVoice() {
    if (!regBlob) return;
    unlockAudio();
    const url = URL.createObjectURL(regBlob);
    const audio = new Audio(url);
    audio.onended = () => URL.revokeObjectURL(url);
    audio.play().catch(() => URL.revokeObjectURL(url));
  }

  async function submitVoice() {
    setStatus('登録中...');
    const form = new FormData();
    form.append('file', regBlob, 'voice.webm');
    const res = await fetch('/register-voice', { method: 'POST', body: form });
    if (res.ok) {
      document.getElementById('reg-panel').classList.add('hidden');
      document.getElementById('chat-panel').classList.remove('hidden');
      const badge = document.getElementById('voice-badge');
      badge.textContent = '声 登録済';
      badge.className = 'badge badge-done';
      addMsg('声の登録が完了しました。話しかけてみてください！', 'system');
      setStatus('');
    } else {
      setStatus('エラー。もう一度お試しください。');
    }
  }

  // ── Chat ────────────────────────────────────────────────────
  async function toggleChat() {
    if (recorder && recorder.state === 'recording') {
      recorder.onstop = async () => {
        if (chatStream) chatStream.getTracks().forEach(t => t.stop());
        await sendChat(new Blob(chunks, { type: 'audio/webm' }));
      };
      recorder.stop();
      document.getElementById('btn-mic').classList.remove('recording');
      document.getElementById('mic-hint').textContent = 'タップして話す';
    } else {
      unlockAudio();
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chatStream = stream;
      chunks = [];
      recorder = new MediaRecorder(stream);
      recorder.ondataavailable = ev => chunks.push(ev.data);
      recorder.start();
      document.getElementById('btn-mic').classList.add('recording');
      document.getElementById('mic-hint').textContent = '録音中 — もう一度タップで送信';
    }
  }

  async function sendChat(blob) {
    const btn = document.getElementById('btn-mic');
    btn.disabled = true;
    setStatus('AIが考え中...');
    const form = new FormData();
    form.append('file', blob, 'chat.webm');
    try {
      const res = await fetch('/chat', { method: 'POST', body: form });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      addMsg(data.user_text, 'user');
      addMsg(data.reply_text, 'ai');
      setStatus('AIが返答中...');
      await playAudio(data.audio_base64);
    } catch (err) {
      setStatus('エラー: ' + err.message);
    } finally {
      btn.disabled = false;
      setStatus('');
    }
  }

  // ── Playback ────────────────────────────────────────────────
  let pendingB64 = null;

  async function playAudio(b64) {
    const played = await tryAutoplay(b64);
    if (!played) {
      pendingB64 = b64;
      document.getElementById('btn-play-ai').classList.remove('hidden');
      document.getElementById('btn-mic').classList.add('hidden');
      setStatus('タップして音声を再生してください');
      await new Promise(r => { document.getElementById('btn-play-ai')._resolve = r; });
    }
  }

  function tryAutoplay(b64) {
    return new Promise(resolve => {
      const bytes = atob(b64);
      const arr = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
      const url = URL.createObjectURL(new Blob([arr], { type: 'audio/wav' }));
      const audio = new Audio(url);
      audio.onended = () => { URL.revokeObjectURL(url); resolve(true); };
      audio.onerror = () => { URL.revokeObjectURL(url); resolve(false); };
      setTimeout(() => resolve(true), 120000);
      audio.play().catch(() => { URL.revokeObjectURL(url); resolve(false); });
    });
  }

  function playPending() {
    const btn = document.getElementById('btn-play-ai');
    const resolve = btn._resolve;
    btn.classList.add('hidden');
    document.getElementById('btn-mic').classList.remove('hidden');
    if (!pendingB64) { if (resolve) resolve(); return; }
    const b64 = pendingB64; pendingB64 = null;
    const bytes = atob(b64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([arr], { type: 'audio/wav' }));
    const audio = new Audio(url);
    audio.onended = () => { URL.revokeObjectURL(url); if (resolve) resolve(); };
    audio.onerror = () => { URL.revokeObjectURL(url); if (resolve) resolve(); };
    audio.play().catch(() => { URL.revokeObjectURL(url); if (resolve) resolve(); });
  }
</script>
</body>
</html>
