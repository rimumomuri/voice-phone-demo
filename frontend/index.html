<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI 電話対応デモ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      background: #f2f2f7;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: #fff;
      padding: 14px 18px 12px;
      border-bottom: 1px solid #e5e5ea;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-title { font-size: 16px; font-weight: 600; color: #111; }

    /* Voice strip */
    .voice-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #fff;
      border-bottom: 1px solid #e5e5ea;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .voice-strip::-webkit-scrollbar { display: none; }
    .voice-strip-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      color: #aaa; flex-shrink: 0; text-transform: uppercase;
    }
    .voice-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 8px 6px 12px;
      border-radius: 20px;
      border: 1.5px solid #e5e5ea;
      background: #f7f7f7;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .voice-chip.selected {
      background: #1c1c1e;
      color: #fff;
      border-color: #1c1c1e;
    }
    .chip-icon {
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; cursor: pointer; flex-shrink: 0;
      background: rgba(0,0,0,0.08);
    }
    .voice-chip.selected .chip-icon { background: rgba(255,255,255,0.2); }
    .chip-icon:active { opacity: 0.6; }
    .voice-chip-add {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px dashed #ccc;
      background: #fff;
      font-size: 13px; font-weight: 500; color: #888;
      cursor: pointer; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .voice-chip-add:active { background: #f5f5f5; }

    /* Tabs */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 1px solid #e5e5ea;
      flex-shrink: 0;
    }
    .tab {
      flex: 1; padding: 10px; text-align: center;
      font-size: 13px; font-weight: 500; color: #888;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab.active { color: #1c1c1e; border-bottom-color: #1c1c1e; }

    /* Panels */
    .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }

    /* Chat */
    .chat-area {
      flex: 1; overflow-y: auto;
      padding: 14px 14px 6px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .msg {
      max-width: 80%; padding: 10px 14px;
      border-radius: 18px; font-size: 14px;
      line-height: 1.55; word-break: break-word;
    }
    .msg-user   { background: #1c1c1e; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-ai     { background: #fff; color: #222; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e5e5ea; }
    .msg-system { align-self: center; font-size: 12px; color: #aaa; background: none; padding: 2px 0; max-width: 100%; text-align: center; }

    /* Timing display */
    .timing-card {
      background: #fff; border: 1px solid #e5e5ea;
      border-radius: 12px; padding: 10px 14px;
      margin: 0 14px; flex-shrink: 0;
    }
    .timing-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 0; font-size: 12px;
    }
    .timing-label { color: #888; width: 100px; flex-shrink: 0; }
    .timing-bar-wrap { flex: 1; height: 4px; background: #f0f0f0; border-radius: 2px; overflow: hidden; }
    .timing-bar { height: 100%; border-radius: 2px; width: 0; transition: width 0.4s; }
    .timing-bar.stt  { background: #5856d6; }
    .timing-bar.llm  { background: #ff9500; }
    .timing-bar.tts  { background: #34c759; }
    .timing-val { color: #333; font-weight: 600; width: 36px; text-align: right; flex-shrink: 0; }
    .timing-spin { font-size: 11px; color: #aaa; }

    /* Bottom */
    .bottom {
      background: #fff; border-top: 1px solid #e5e5ea;
      padding: 16px 20px 32px; flex-shrink: 0;
    }

    /* Buttons */
    .btn {
      border: none; border-radius: 10px; cursor: pointer;
      font-size: 14px; font-weight: 500; padding: 11px 18px;
      transition: opacity 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-dark  { background: #1c1c1e; color: #fff; flex: 1; }
    .btn-light { background: #f0f0f0; color: #111; }
    .btn-dark:active:not(:disabled)  { opacity: 0.7; }
    .btn-light:active:not(:disabled) { background: #e0e0e0; }

    /* Mic */
    .mic-area {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
    }
    .mic-btn {
      width: 68px; height: 68px; border-radius: 50%;
      background: #1c1c1e; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, background 0.15s;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .mic-btn.recording { background: #c0392b; transform: scale(0.94); }
    .mic-btn:disabled  { opacity: 0.35; cursor: not-allowed; }
    .mic-btn svg { width: 26px; height: 26px; fill: #fff; }
    .mic-hint { font-size: 12px; color: #aaa; }
    .btn-play-ai {
      width: 100%; padding: 15px;
      background: #1a6b3a; color: #fff;
      border-radius: 12px; font-size: 15px; font-weight: 500;
      border: none; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .btn-play-ai:active { opacity: 0.8; }

    /* Script panel */
    .script-area {
      flex: 1; overflow-y: auto; padding: 14px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .script-section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: #aaa; margin-top: 4px;
    }
    .script-btn {
      background: #fff; border: 1px solid #e5e5ea;
      border-radius: 12px; padding: 12px 16px;
      font-size: 13px; color: #222; line-height: 1.5;
      cursor: pointer; text-align: left;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
      display: flex; align-items: center; gap: 10px;
    }
    .script-btn:active { background: #f0f0f0; }
    .script-btn.playing { background: #f0fff4; border-color: #34c759; }
    .script-btn .play-icon { width: 28px; height: 28px; border-radius: 50%; background: #1c1c1e; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .script-btn.playing .play-icon { background: #34c759; }
    .script-btn .play-icon svg { width: 14px; height: 14px; fill: #fff; }
    .script-btn .script-text-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .script-btn .script-text { line-height: 1.45; }
    /* Script cache states */
    @keyframes tts-spin { to { transform: rotate(360deg); } }
    .script-btn.loading .play-icon { background: #ff9500; }
    .script-btn.loading .play-icon svg { animation: tts-spin 0.9s linear infinite; transform-origin: center; }
    .script-btn.loading { pointer-events: none; }
    .script-btn.tts-ready .play-icon { background: #1a6b3a; }
    .script-status {
      font-size: 10px; color: #aaa; letter-spacing: 0.3px;
      margin-top: 2px;
    }
    .script-btn.loading .script-status { color: #ff9500; }
    .script-btn.tts-ready .script-status { color: #1a6b3a; }

    /* Registration overlay (bottom sheet) */
    .reg-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: flex-end;
      animation: fadeIn 0.15s;
    }
    .reg-overlay.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .reg-sheet {
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 20px 20px 44px;
      width: 100%; max-width: 480px;
      margin: 0 auto;
      animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: none; opacity: 1; } }
    .reg-sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px;
    }
    .reg-sheet-title { font-size: 16px; font-weight: 700; color: #111; }
    .reg-sheet-close {
      width: 28px; height: 28px; border-radius: 50%;
      background: #f0f0f0; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #555; line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .reg-script-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: #aaa;
      margin-bottom: 8px; margin-top: 16px;
    }
    .reg-script {
      background: #f7f7f7; border-left: 3px solid #d0d0d0;
      padding: 10px 14px; font-size: 13px; color: #444;
      line-height: 1.65; border-radius: 0 8px 8px 0; margin-bottom: 14px;
    }
    .reg-name-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .reg-name-label { font-size: 13px; color: #555; flex-shrink: 0; }
    .reg-name-input {
      flex: 1; border: 1px solid #e5e5ea; border-radius: 8px;
      padding: 8px 12px; font-size: 14px; color: #111; outline: none;
    }
    .reg-name-input:focus { border-color: #1c1c1e; }
    .reg-actions { display: flex; gap: 8px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-title">AI 電話対応デモ</span>
</div>

<!-- Voice strip (always visible) -->
<div class="voice-strip" id="voice-strip">
  <!-- populated by JS -->
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" id="tab-chat" onclick="switchTab('chat')">AI 会話</div>
  <div class="tab" id="tab-script" onclick="switchTab('script')">スクリプト</div>
</div>

<!-- ========== Panel: AI 会話 ========== -->
<div class="panel active" id="panel-chat">
  <div class="chat-area" id="chat-messages">
    <div class="msg msg-system" id="chat-no-voice-hint">声を選択してから話しかけてください</div>
  </div>

  <div class="timing-card hidden" id="timing-card">
    <div class="timing-row">
      <span class="timing-label">Whisper (STT)</span>
      <div class="timing-bar-wrap"><div class="timing-bar stt" id="bar-stt"></div></div>
      <span class="timing-val" id="val-stt"><span class="timing-spin">...</span></span>
    </div>
    <div class="timing-row">
      <span class="timing-label">GPT-4o-mini</span>
      <div class="timing-bar-wrap"><div class="timing-bar llm" id="bar-llm"></div></div>
      <span class="timing-val" id="val-llm"><span class="timing-spin">—</span></span>
    </div>
    <div class="timing-row">
      <span class="timing-label">VoxCPM (GPU)</span>
      <div class="timing-bar-wrap"><div class="timing-bar tts" id="bar-tts"></div></div>
      <span class="timing-val" id="val-tts"><span class="timing-spin">—</span></span>
    </div>
  </div>

  <div class="bottom">
    <div class="mic-area">
      <button class="btn-play-ai hidden" id="btn-play-ai" onclick="playPending()">タップして再生</button>
      <button class="mic-btn" id="btn-mic" onclick="toggleChat()" disabled>
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.31 6-6.72h-1.7z"/></svg>
      </button>
      <span class="mic-hint" id="mic-hint">声を選択してください</span>
    </div>
  </div>
</div>

<!-- ========== Panel: スクリプト ========== -->
<div class="panel" id="panel-script">
  <div class="script-area">
    <div class="script-section-title">受付フレーズ</div>

    <button class="script-btn" data-text="はい、お電話ありがとうございます。ご用件をお聞かせください。" onclick="playScript(this)">
      <div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="script-text-wrap">
        <span class="script-text">はい、お電話ありがとうございます。ご用件をお聞かせください。</span>
        <span class="script-status"></span>
      </div>
    </button>

    <button class="script-btn" data-text="少々お待ちください。担当者に確認いたします。" onclick="playScript(this)">
      <div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="script-text-wrap">
        <span class="script-text">少々お待ちください。担当者に確認いたします。</span>
        <span class="script-status"></span>
      </div>
    </button>

    <button class="script-btn" data-text="ご予約の日時を教えていただけますか。" onclick="playScript(this)">
      <div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="script-text-wrap">
        <span class="script-text">ご予約の日時を教えていただけますか。</span>
        <span class="script-status"></span>
      </div>
    </button>

    <button class="script-btn" data-text="かしこまりました。ご予約を承りました。当日お待ちしております。" onclick="playScript(this)">
      <div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="script-text-wrap">
        <span class="script-text">かしこまりました。ご予約を承りました。当日お待ちしております。</span>
        <span class="script-status"></span>
      </div>
    </button>

    <button class="script-btn" data-text="ありがとうございました。またのお電話をお待ちしております。失礼いたします。" onclick="playScript(this)">
      <div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="script-text-wrap">
        <span class="script-text">ありがとうございました。またのお電話をお待ちしております。失礼いたします。</span>
        <span class="script-status"></span>
      </div>
    </button>

    <div class="script-section-title" style="margin-top:8px;">クレーム対応</div>

    <button class="script-btn" data-text="ご不便をおかけし、大変申し訳ございません。" onclick="playScript(this)">
      <div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="script-text-wrap">
        <span class="script-text">ご不便をおかけし、大変申し訳ございません。</span>
        <span class="script-status"></span>
      </div>
    </button>

    <button class="script-btn" data-text="状況を確認の上、折り返しご連絡いたします。" onclick="playScript(this)">
      <div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="script-text-wrap">
        <span class="script-text">状況を確認の上、折り返しご連絡いたします。</span>
        <span class="script-status"></span>
      </div>
    </button>
  </div>
</div>

<!-- ========== Registration bottom sheet ========== -->
<div class="reg-overlay hidden" id="reg-overlay" onclick="handleOverlayBg(event)">
  <div class="reg-sheet" id="reg-sheet">
    <div class="reg-sheet-header">
      <span class="reg-sheet-title">新しい声を登録</span>
      <button class="reg-sheet-close" onclick="closeRegOverlay()">✕</button>
    </div>

    <div class="reg-script-label">以下のフレーズを読み上げてください</div>
    <div class="reg-script">「こんにちは。本日はお電話いただきありがとうございます。少々お待ちください。どのようなご用件でしょうか。」</div>

    <div class="reg-name-row">
      <span class="reg-name-label">名前</span>
      <input class="reg-name-input" id="reg-name-input" type="text" placeholder="例: 田中さん" maxlength="20">
    </div>

    <div class="reg-actions">
      <button class="btn btn-dark" id="btn-rec" onclick="toggleRegister()">録音開始</button>
      <button class="btn btn-light hidden" id="btn-preview" onclick="previewVoice()">確認</button>
      <button class="btn btn-light hidden" id="btn-register" onclick="submitVoice()">登録</button>
    </div>
  </div>
</div>

<script>
  // State
  let recorder = null, chunks = [], regBlob = null;
  let chatStream = null, audioCtx = null;
  let selectedVoiceId = null;
  let voices = [];
  const readyPhrases = new Set();
  let cachePollingTimer = null;

  function unlockAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── Tabs ──────────────────────────────────────────────────────
  function switchTab(name) {
    ['chat', 'script'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('active', t === name);
      document.getElementById('panel-' + t).classList.toggle('active', t === name);
    });
  }

  // ── Voice strip ───────────────────────────────────────────────
  async function loadVoices() {
    try {
      const res = await fetch('voices');
      voices = res.ok ? await res.json() : [];
    } catch { voices = []; }
    renderVoiceStrip();
    if (!selectedVoiceId && voices.length > 0) {
      selectVoice(voices[0].id, false);
    }
  }

  function renderVoiceStrip() {
    const strip = document.getElementById('voice-strip');
    strip.innerHTML = '';

    const label = document.createElement('span');
    label.className = 'voice-strip-label';
    label.textContent = '声';
    strip.appendChild(label);

    voices.forEach(v => {
      const chip = document.createElement('div');
      chip.className = 'voice-chip' + (v.id === selectedVoiceId ? ' selected' : '');
      chip.innerHTML =
        `<span>${escHtml(v.name)}</span>` +
        `<span class="chip-icon" title="試聴" data-play="${v.id}">▶</span>` +
        `<span class="chip-icon" title="削除" data-del="${v.id}">✕</span>`;
      chip.querySelector('[data-play]').addEventListener('click', e => { e.stopPropagation(); previewVoiceChip(v.id); });
      chip.querySelector('[data-del]').addEventListener('click', e => { e.stopPropagation(); deleteVoice(v.id, v.name); });
      chip.addEventListener('click', () => selectVoice(v.id, true));
      strip.appendChild(chip);
    });

    const addBtn = document.createElement('div');
    addBtn.className = 'voice-chip-add';
    addBtn.onclick = openRegOverlay;
    addBtn.innerHTML =
      `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>` +
      `録音`;
    strip.appendChild(addBtn);
  }

  function selectVoice(id, showMsg) {
    selectedVoiceId = id;
    renderVoiceStrip();
    const hasVoice = !!selectedVoiceId;
    document.getElementById('chat-no-voice-hint').style.display = hasVoice ? 'none' : '';
    document.getElementById('btn-mic').disabled = !hasVoice;
    document.getElementById('mic-hint').textContent = hasVoice ? 'タップして話す' : '声を選択してください';
    if (showMsg && id) {
      const v = voices.find(v => v.id === id);
      if (v) addMsg(`「${v.name}」を使用します。`, 'system');
    }
    // キャッシュ関連リセット & warm-up
    readyPhrases.clear();
    markReadyButtons();
    if (id) startWarmCache(id);
  }

  // ── Script cache management ───────────────────────────────────
  function getScriptPhrases() {
    return Array.from(document.querySelectorAll('.script-btn[data-text]')).map(b => b.dataset.text);
  }

  async function startWarmCache(voiceId) {
    if (cachePollingTimer) clearInterval(cachePollingTimer);
    const phrases = getScriptPhrases();
    try {
      await fetch('voices/' + voiceId + '/warm-cache', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ texts: phrases })
      });
    } catch {}
    // Poll every 15s to check which phrases are ready
    await checkCacheStatus(voiceId);
    cachePollingTimer = setInterval(() => checkCacheStatus(voiceId), 15000);
    // Stop polling after 10 minutes
    setTimeout(() => { if (cachePollingTimer) clearInterval(cachePollingTimer); }, 600000);
  }

  async function checkCacheStatus(voiceId) {
    if (!voiceId) return;
    try {
      const res = await fetch('tts/cache-check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ voice_id: voiceId, texts: getScriptPhrases() })
      });
      if (!res.ok) return;
      const data = await res.json();
      data.ready.forEach(t => readyPhrases.add(t));
      markReadyButtons();
      if (data.ready.length === getScriptPhrases().length) {
        clearInterval(cachePollingTimer);
      }
    } catch {}
  }

  function markReadyButtons() {
    document.querySelectorAll('.script-btn[data-text]').forEach(btn => {
      const text = btn.dataset.text;
      const isReady = readyPhrases.has(text);
      btn.classList.toggle('tts-ready', isReady);
      const statusEl = btn.querySelector('.script-status');
      if (statusEl) statusEl.textContent = isReady ? '準備完了 — すぐ再生' : '';
    });
  }

  async function deleteVoice(id, name) {
    if (!confirm(`「${name}」を削除しますか？`)) return;
    try {
      await fetch('voices/' + id, { method: 'DELETE' });
    } catch {}
    if (selectedVoiceId === id) selectedVoiceId = null;
    await loadVoices();
    if (!selectedVoiceId && voices.length > 0) selectVoice(voices[0].id, false);
    else selectVoice(selectedVoiceId, false);
  }

  async function previewVoiceChip(id) {
    unlockAudio();
    try {
      const res = await fetch('voices/' + id + '/audio');
      if (!res.ok) return;
      const buf = await res.arrayBuffer();
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      const decoded = await audioCtx.decodeAudioData(buf);
      const src = audioCtx.createBufferSource();
      src.buffer = decoded;
      src.connect(audioCtx.destination);
      src.start(0);
    } catch (e) { console.error(e); }
  }

  // ── Registration overlay ──────────────────────────────────────
  function openRegOverlay() {
    regBlob = null;
    document.getElementById('btn-preview').classList.add('hidden');
    document.getElementById('btn-register').classList.add('hidden');
    const rec = document.getElementById('btn-rec');
    rec.textContent = '録音開始'; rec.style.background = ''; rec.disabled = false;
    document.getElementById('reg-name-input').value = '';
    document.getElementById('reg-overlay').classList.remove('hidden');
  }

  function closeRegOverlay() {
    if (recorder && recorder.state === 'recording') recorder.stop();
    document.getElementById('reg-overlay').classList.add('hidden');
  }

  function handleOverlayBg(e) {
    if (e.target === document.getElementById('reg-overlay')) closeRegOverlay();
  }

  // ── Voice recording ───────────────────────────────────────────
  async function toggleRegister() {
    const btn = document.getElementById('btn-rec');
    if (recorder && recorder.state === 'recording') {
      recorder.stop();
      btn.textContent = '録音開始'; btn.style.background = '';
      return;
    }
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    chunks = [];
    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      regBlob = new Blob(chunks, { type: 'audio/webm' });
      document.getElementById('btn-preview').classList.remove('hidden');
      document.getElementById('btn-register').classList.remove('hidden');
    };
    recorder.start();
    btn.textContent = '停止'; btn.style.background = '#c0392b';
  }

  async function previewVoice() {
    if (!regBlob) return;
    unlockAudio();
    const reader = new FileReader();
    reader.onload = async e => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      const buf = await audioCtx.decodeAudioData(e.target.result);
      const src = audioCtx.createBufferSource();
      src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
    };
    reader.readAsArrayBuffer(regBlob);
  }

  async function submitVoice() {
    if (!regBlob) return;
    const btn = document.getElementById('btn-register');
    btn.disabled = true;
    btn.textContent = '登録中...';
    const name = document.getElementById('reg-name-input').value.trim() || ('声' + (voices.length + 1));
    try {
      const form = new FormData();
      form.append('file', regBlob, 'voice.webm');
      form.append('name', name);
      const res = await fetch('register-voice', { method: 'POST', body: form });
      if (res.ok) {
        const data = await res.json();
        closeRegOverlay();
        await loadVoices();
        selectVoice(data.id, false);
        addMsg(`「${data.name}」の声を登録しました。`, 'system');
      } else {
        const err = await res.text().catch(() => String(res.status));
        alert('登録に失敗しました: ' + err);
        btn.disabled = false;
        btn.textContent = '登録';
      }
    } catch (e) {
      alert('通信エラー: ' + e.message);
      btn.disabled = false;
      btn.textContent = '登録';
    }
  }

  function addMsg(text, type) {
    const area = document.getElementById('chat-messages');
    const d = document.createElement('div');
    d.className = 'msg msg-' + type;
    d.textContent = text;
    area.appendChild(d);
    area.scrollTop = area.scrollHeight;
  }

  // ── Timing display ────────────────────────────────────────────
  let maxTiming = 60;

  function timingReset() {
    document.getElementById('timing-card').classList.remove('hidden');
    ['stt','llm','tts'].forEach(k => {
      document.getElementById('bar-' + k).style.width = '0';
      document.getElementById('val-' + k).innerHTML = k === 'stt'
        ? '<span class="timing-spin">...</span>'
        : '<span class="timing-spin">—</span>';
    });
  }

  function timingSet(key, seconds) {
    const pct = Math.min(100, (seconds / maxTiming) * 100);
    document.getElementById('bar-' + key).style.width = pct + '%';
    document.getElementById('val-' + key).textContent = seconds + 's';
    if (key === 'stt') document.getElementById('val-llm').innerHTML = '<span class="timing-spin">...</span>';
    if (key === 'llm') document.getElementById('val-tts').innerHTML = '<span class="timing-spin">...</span>';
  }

  // ── Chat ──────────────────────────────────────────────────────
  async function toggleChat() {
    if (recorder && recorder.state === 'recording') {
      recorder.onstop = async () => {
        if (chatStream) chatStream.getTracks().forEach(t => t.stop());
        await sendChat(new Blob(chunks, { type: 'audio/webm' }));
      };
      recorder.stop();
      document.getElementById('btn-mic').classList.remove('recording');
      document.getElementById('mic-hint').textContent = 'タップして話す';
    } else {
      unlockAudio();
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chatStream = stream; chunks = [];
      recorder = new MediaRecorder(stream);
      recorder.ondataavailable = ev => chunks.push(ev.data);
      recorder.start();
      document.getElementById('btn-mic').classList.add('recording');
      document.getElementById('mic-hint').textContent = '録音中 — もう一度タップで送信';
    }
  }

  async function sendChat(blob) {
    const micBtn = document.getElementById('btn-mic');
    micBtn.disabled = true;
    timingReset();

    // ① STT
    const form = new FormData();
    form.append('file', blob, 'chat.webm');
    let sttRes;
    try {
      sttRes = await fetch('stt', { method: 'POST', body: form });
      if (!sttRes.ok) throw new Error(await sttRes.text());
    } catch {
      micBtn.disabled = false;
      document.getElementById('val-stt').textContent = 'ERR';
      return;
    }
    const sttData = await sttRes.json();
    timingSet('stt', sttData.elapsed);
    addMsg(sttData.text, 'user');

    // ② LLM
    let llmRes;
    try {
      llmRes = await fetch('llm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: sttData.text })
      });
      if (!llmRes.ok) throw new Error(await llmRes.text());
    } catch {
      micBtn.disabled = false;
      document.getElementById('val-llm').textContent = 'ERR';
      return;
    }
    const llmData = await llmRes.json();
    timingSet('llm', llmData.elapsed);
    addMsg(llmData.reply, 'ai');

    // ③ TTS (선택된 voice_id 전달)
    let ttsRes;
    try {
      ttsRes = await fetch('tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: llmData.reply, voice_id: selectedVoiceId })
      });
      if (!ttsRes.ok) throw new Error(await ttsRes.text());
    } catch {
      micBtn.disabled = false;
      document.getElementById('val-tts').textContent = 'ERR';
      return;
    }
    const ttsData = await ttsRes.json();
    timingSet('tts', ttsData.elapsed);

    const times = [sttData.elapsed, llmData.elapsed, ttsData.elapsed];
    maxTiming = Math.max(...times) * 1.2;
    ['stt','llm','tts'].forEach((k, i) => {
      document.getElementById('bar-' + k).style.width = Math.min(100, (times[i] / maxTiming) * 100) + '%';
    });

    await playAudio(ttsData.audio_base64);
    micBtn.disabled = false;
  }

  // ── Script playback ───────────────────────────────────────────
  let activeScriptBtn = null;

  async function playScript(btn) {
    if (!selectedVoiceId) {
      alert('声を選択してください。');
      return;
    }
    if (btn.classList.contains('loading')) return;
    const text = btn.dataset.text;
    if (!text) return;

    if (activeScriptBtn && activeScriptBtn !== btn) activeScriptBtn.classList.remove('playing');
    activeScriptBtn = btn;
    unlockAudio();

    const statusEl = btn.querySelector('.script-status');
    const isCached = readyPhrases.has(text);

    if (!isCached) {
      btn.classList.add('loading');
      if (statusEl) statusEl.textContent = '生成中...';
    } else {
      btn.classList.add('playing');
    }

    try {
      const res = await fetch('tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, voice_id: selectedVoiceId })
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      readyPhrases.add(text);
      markReadyButtons();
      btn.classList.remove('loading');
      btn.classList.add('playing');
      await playAudioDirect(data.audio_base64);
    } catch (e) {
      console.error(e);
    } finally {
      btn.classList.remove('loading', 'playing');
      if (activeScriptBtn === btn) activeScriptBtn = null;
    }
  }

  // ── Playback (AudioContext — iOS autoplay safe) ───────────────
  let pendingB64 = null;

  function b64ToBuffer(b64) {
    const bytes = atob(b64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return arr.buffer;
  }

  async function playWithCtx(b64) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const buf = await audioCtx.decodeAudioData(b64ToBuffer(b64));
    return new Promise(resolve => {
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(audioCtx.destination);
      src.onended = resolve;
      src.start(0);
    });
  }

  async function playAudio(b64) {
    try {
      await playWithCtx(b64);
    } catch {
      pendingB64 = b64;
      document.getElementById('btn-play-ai').classList.remove('hidden');
      document.getElementById('btn-mic').classList.add('hidden');
      await new Promise(r => { document.getElementById('btn-play-ai')._resolve = r; });
    }
  }

  async function playAudioDirect(b64) {
    try {
      await playWithCtx(b64);
    } catch (e) { console.error('playAudioDirect failed', e); }
  }

  function playPending() {
    const btn = document.getElementById('btn-play-ai');
    const resolve = btn._resolve;
    btn.classList.add('hidden');
    document.getElementById('btn-mic').classList.remove('hidden');
    if (!pendingB64) { if (resolve) resolve(); return; }
    const b64 = pendingB64; pendingB64 = null;
    playWithCtx(b64).then(() => { if (resolve) resolve(); }).catch(() => { if (resolve) resolve(); });
  }

  // ── Init ──────────────────────────────────────────────────────
  loadVoices();
</script>
</body>
</html>
